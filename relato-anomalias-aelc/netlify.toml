E o netlify.toml da raiz tem base = "frontend", que diz ao Netlify para entrar nessa pasta antes de fazer build.

🚀 Como aplicar a correção (2 opções)
Opção A · Descarregar o ZIP novo e re-upload no GitHub
Descarregue o ZIP atualizado em /app/frontend/assets/downloads/relato-anomalias-aelc.zip
No seu repositório GitHub:
Apague o ficheiro frontend/netlify.toml (Edit → trash icon → Commit)
Adicione o novo netlify.toml à raiz do repo (Add file → Upload → arrastar)
Netlify fará rebuild automaticamente
Opção B · Mais rápido — só editar 2 ficheiros no GitHub manualmente
No seu repo, vá a frontend/netlify.toml → clique no ícone do lápis → apague tudo → OU clique no caixote do lixo para eliminar o ficheiro → Commit
Volte à raiz do repo → "Add file" → "Create new file" → nome netlify.toml
Cole o seguinte conteúdo exato:
[build]
  base = "frontend"
  command = "npx expo export -p web"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
